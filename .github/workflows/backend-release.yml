name: Backend Release Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
      - "release/**"
    paths:
      - ".github/workflows/backend-release.yml"
      - "docker-compose.yml"
      - "docs/CI/CD_Pipeline.md"
      - "migration/**"
      - "stellaux_server/**"
  workflow_dispatch:
    inputs:
      environment:
        description: Which Fly environment to deploy
        required: true
        type: choice
        default: staging
        options:
          - staging
          - production

permissions:
  contents: read

concurrency:
  group: backend-release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  release-build:
    name: Optimized Release Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellaux_server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install stable Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            stellaux_server -> target

      - name: Build release binary
        run: cargo build --locked --release --bin stellaux_server

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: stellaux-server-linux-amd64
          path: stellaux_server/target/release/stellaux_server
          if-no-files-found: error

  docker-image:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: release-build
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-stage production image
        uses: docker/build-push-action@v6
        with:
          context: ./stellaux_server
          file: ./stellaux_server/Dockerfile
          push: false
          tags: stellaux-server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy Staging To Fly.io
    runs-on: ubuntu-latest
    needs:
      - release-build
      - docker-image
    if: github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment:
      name: staging
    defaults:
      run:
        working-directory: stellaux_server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy staging app
        run: flyctl deploy --remote-only --config fly.staging.toml --strategy rolling --wait-timeout 600
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-production:
    name: Deploy Production To Fly.io
    runs-on: ubuntu-latest
    needs:
      - release-build
      - docker-image
    if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/release/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production')
    environment:
      name: production
    defaults:
      run:
        working-directory: stellaux_server
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy production app
        run: flyctl deploy --remote-only --config fly.production.toml --strategy rolling --wait-timeout 600
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
