name: Docs Gateway Freshness

on:
  push:
    paths:
      - "docs/**"
      - ".github/workflows/docs-gateway-freshness.yml"
  pull_request:
    paths:
      - "docs/**"
      - ".github/workflows/docs-gateway-freshness.yml"
  workflow_dispatch:

jobs:
  validate-gateway:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: Stellaux_Website
      SHARED_DOCS_MANIFEST_URL: ${{ vars.SHARED_DOCS_MANIFEST_URL }}
      LAUNCHER_FILE: docs/OPEN_DOCS_GATEWAY.html
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate launcher and manifest freshness
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const project = process.env.PROJECT_NAME;
          const manifestUrl = process.env.SHARED_DOCS_MANIFEST_URL;
          const launcherFile = process.env.LAUNCHER_FILE;

          if (!manifestUrl) {
            throw new Error('SHARED_DOCS_MANIFEST_URL repo variable is required.');
          }

          if (!fs.existsSync(launcherFile)) {
            throw new Error(`Missing launcher file: ${launcherFile}`);
          }

          const launcher = fs.readFileSync(launcherFile, 'utf-8');
          if (!launcher.includes(`project=${project}`)) {
            throw new Error(`Launcher must deep-link with project=${project}`);
          }

          function walkDocs(dir) {
            if (!fs.existsSync(dir)) return [];
            const stack = [dir];
            const files = [];
            while (stack.length) {
              const current = stack.pop();
              for (const entry of fs.readdirSync(current, { withFileTypes: true })) {
                if (entry.name.startsWith('.')) continue;
                const absolute = path.join(current, entry.name);
                if (entry.isDirectory()) {
                  stack.push(absolute);
                  continue;
                }
                if (entry.name === 'OPEN_DOCS_GATEWAY.html') continue;
                const ext = path.extname(entry.name).toLowerCase();
                if (['.md', '.markdown', '.html', '.htm'].includes(ext)) {
                  files.push(path.relative(dir, absolute).split(path.sep).join('/'));
                }
              }
            }
            return files.sort();
          }

          async function main() {
            const response = await fetch(manifestUrl, { cache: 'no-store' });
            if (!response.ok) {
              throw new Error(`Cannot fetch shared manifest: ${response.status}`);
            }
            const manifest = await response.json();
            const sharedSet = new Set(
              (manifest.entries || [])
                .filter((entry) => entry.project === project)
                .map((entry) => entry.relativePath)
            );

            const localFiles = walkDocs('docs');
            const missing = localFiles.filter((file) => !sharedSet.has(file));
            if (missing.length) {
              throw new Error(
                `Shared gateway manifest is missing ${missing.length} docs:\n${missing.join('\n')}`
              );
            }

            console.log(`Verified ${localFiles.length} docs for ${project}.`);
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE
