# Fly.io staging deployment for `stellaux_server`.
#
# Deploy from the crate root so the Docker build context matches the Dockerfile:
#     cd stellaux_server
#     fly deploy --remote-only --config fly.staging.toml
#
# The GitHub Actions workflow deploys from this same working directory.
#
# Before first deploy:
#   1. Create the app if needed: `fly apps create stellaux-server-staging`
#   2. Set staging secrets with `fly secrets set --app stellaux-server-staging ...`
#   3. Keep `DATABASE_URL` pointed at the staging database, not production.

app = "stellaux-server-staging"
primary_region = "iad"

[build]

[env]
  APP_ENV = "staging"
  SERVER_HOST = "0.0.0.0"
  SERVER_PORT = "8080"
  RUST_LOG = "info,stellaux_server=info"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/readyz"
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
